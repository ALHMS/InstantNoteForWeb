<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstantNote</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- 変数定義 (色の設定) --- */
        :root {
            /* ライトモード (通常) */
            --bg-color: #ffffff;
            --header-bg-color: #f8f9fa;
            --text-color: #333333; /* 濃いグレー */
            --textarea-bg-color: #ffffff;
            --border-color: #e0e0e0;
            
            --btn-bg-color: #ffffff;
            --btn-active-bg-color: #e2e6ea;
            --btn-primary-color: #007bff; /* 青 */
            --btn-danger-color: #dc3545; /* 赤 */
            
            --toast-bg-color: rgba(50, 50, 50, 0.9);
            --toast-text-color: #ffffff;
        }

        /* --- ダークモード対応 (@media) --- */
        @media (prefers-color-scheme: dark) {
            :root {
                /* 背景色：かなり濃いめの青 */
                --bg-color: #10171d; 
                --header-bg-color: #161f27;
                --textarea-bg-color: #10171d;
                --border-color: #2a3b4c;

                /* テキスト：目が疲れない色 (少し青みがかった薄いグレー) */
                --text-color: #e6f1ff; 

                --btn-bg-color: #161f27;
                --btn-active-bg-color: #2a3b4c;
                --btn-primary-color: #3399ff; /* 少し明るめの青 */
                --btn-danger-color: #ff6b6b; /* 少し明るめの赤 */

                --toast-bg-color: rgba(230, 241, 255, 0.95);
                --toast-text-color: #10171d;
            }
        }

        /* --- 基本スタイル --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s; /* モード切替をスムーズに */
        }

        /* --- ヘッダーとツールバー --- */
        .controls-container {
            background-color: var(--header-bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 10;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1rem;
            margin: 0;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 文字サイズ */
        .font-size-control {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
        }
        #fontSizeSlider { width: 60px; cursor: pointer; }

        /* 保存トグル */
        .toggle-container {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .toggle-container input { margin: 0 4px 0 0; width: 14px; height: 14px; }

        /* --- ツールバーとアイコンボタン --- */
        .toolbar {
            display: flex;
            gap: 8px; /* ボタン間の間隔 */
        }

        button {
            /* ボタンを正方形に近づける */
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;

            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--btn-bg-color);
            color: var(--text-color); /* これが重要：アイコンの色になる */
            cursor: pointer;
            touch-action: manipulation;
            transition: background-color 0.1s;
        }

        button:active {
            background-color: var(--btn-active-bg-color);
        }

        /* 危険アクション (破棄) */
        button.danger {
            color: var(--btn-danger-color);
            border-color: var(--btn-danger-color);
        }
        button.danger:active {
            background-color: rgba(255, 107, 107, 0.1);
        }

        /* --- CSS Maskによるアイコンの実装 --- */
        .icon {
            display: inline-block;
            /* ユーザー要望：適切にサイズを変えて (16px -> 20px) */
            width: 20px;
            height: 20px;
            /* アイコンの色を現在の文字色 (currentColor) にする魔法 */
            background-color: currentColor; 
            
            /* マスクの設定 (共通) */
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }

        /* 各ボタンのアイコンファイル指定 */
        .icon-undo {
            -webkit-mask-image: url('assets/undo.svg');
            mask-image: url('assets/undo.svg');
        }
        .icon-redo {
            -webkit-mask-image: url('assets/redo.svg');
            mask-image: url('assets/redo.svg');
        }
        .icon-trash {
            -webkit-mask-image: url('assets/trash.svg');
            mask-image: url('assets/trash.svg');
        }
        .icon-copy {
            -webkit-mask-image: url('assets/copy.svg');
            mask-image: url('assets/copy.svg');
        }

        /* --- テキストエリア (全画面) --- */
        #memoArea {
            flex-grow: 1;
            width: 100%;
            padding: 15px;
            font-family: inherit;
            border: none;
            outline: none;
            resize: none;
            box-sizing: border-box;
            background-color: var(--textarea-bg-color);
            color: var(--text-color);
            -webkit-overflow-scrolling: touch;
        }

        /* --- トースト通知 --- */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--toast-bg-color);
            color: var(--toast-text-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="controls-container">
        <header>
            <h1>メモ</h1>
            <div class="header-right">
                <div class="font-size-control">
                    <input type="range" id="fontSizeSlider" min="14" max="26" value="16" step="1">
                </div>
                <label class="toggle-container">
                    <input type="checkbox" id="saveToggle">
                    <span>保存</span>
                </label>
            </div>
        </header>

        <div class="toolbar">
            <button id="btnUndo" title="元に戻す"><span class="icon icon-undo"></span></button>
            <button id="btnRedo" title="やり直し"><span class="icon icon-redo"></span></button>
            <button id="btnClear" class="danger" title="全文破棄"><span class="icon icon-trash"></span></button>
            <button id="btnCopy" title="コピー"><span class="icon icon-copy"></span></button>
        </div>
    </div>

    <textarea id="memoArea" placeholder="ここにメモを入力..."></textarea>
    <div id="toast"></div>

    <script>
        // ... (トースト、履歴管理、文字サイズ、LocalStorageのコードは前回と同じなので割愛) ...
        // ※ただし、saveState()内の saveToLocal('text')、updateTextarea内の saveToLocal('text') はそのまま残してください。

        // --- クリップボード操作 (修正：統合コピー) ---
        document.getElementById('btnCopy').addEventListener('click', async () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            const currentText = memoArea.value;

            // ▼ ユーザー要望：選択されていれば部分、されていなければ全文 ▼
            const isTextSelected = start !== end;
            
            if (isTextSelected) {
                // 部分選択コピー
                const selectedText = currentText.substring(start, end);
                await navigator.clipboard.writeText(selectedText);
                showToast('選択部分をコピーしました');
                
                // 選択範囲を維持してフォーカス
                memoArea.focus();
                memoArea.setSelectionRange(start, end);
            } else {
                // 全文コピー
                await navigator.clipboard.writeText(currentText);
                showToast('全文をコピーしました');
                memoArea.focus();
            }
        });

    </script>
</body>
</html>
