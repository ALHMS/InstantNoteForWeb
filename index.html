<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>オフラインメモ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- 変数定義 --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --textarea-bg-color: #ffffff;
            --border-color: #e0e0e0;
            --header-bg-color: #f8f9fa;
            --tab-bg: #e2e6ea;
            --tab-active-bg: #f8f9fa;
            --bottom-toolbar-bg: rgba(248, 249, 250, 0.3);
            --btn-active-bg-color: rgba(0, 0, 0, 0.05);
            --btn-danger-color: #dc3545;
            --toast-bg-color: rgba(50, 50, 50, 0.9);
            --toast-text-color: #ffffff;
            
            /* モーダル用 */
            --modal-overlay-bg: rgba(0, 0, 0, 0.5);
            --modal-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #10171d; 
                --textarea-bg-color: #10171d;
                --border-color: #2a3b4c;
                --text-color: #e6f1ff; 
                --header-bg-color: #161f27;
                --tab-bg: #0d1217;
                --tab-active-bg: #161f27;
                --bottom-toolbar-bg: rgba(22, 31, 39, 0.3);
                --btn-active-bg-color: rgba(255, 255, 255, 0.1);
                --btn-danger-color: #ff6b6b;
                --toast-bg-color: rgba(230, 241, 255, 0.95);
                --toast-text-color: #10171d;
                
                --modal-overlay-bg: rgba(0, 0, 0, 0.7);
                --modal-bg: #161f27;
            }
        }

        body.force-light {
            --bg-color: #ffffff;
            --text-color: #333333;
            --textarea-bg-color: #ffffff;
            --border-color: #e0e0e0;
            --header-bg-color: #f8f9fa;
            --tab-bg: #e2e6ea;
            --tab-active-bg: #f8f9fa;
            --bottom-toolbar-bg: rgba(248, 249, 250, 0.3);
            --btn-active-bg-color: rgba(0, 0, 0, 0.05);
            --btn-danger-color: #dc3545;
            --toast-bg-color: rgba(50, 50, 50, 0.9);
            --toast-text-color: #ffffff;
            --modal-overlay-bg: rgba(0, 0, 0, 0.5);
            --modal-bg: #ffffff;
        }

        body.force-dark {
            --bg-color: #10171d; 
            --textarea-bg-color: #10171d;
            --border-color: #2a3b4c;
            --text-color: #e6f1ff; 
            --header-bg-color: #161f27;
            --tab-bg: #0d1217;
            --tab-active-bg: #161f27;
            --bottom-toolbar-bg: rgba(22, 31, 39, 0.3);
            --btn-active-bg-color: rgba(255, 255, 255, 0.1);
            --btn-danger-color: #ff6b6b;
            --toast-bg-color: rgba(230, 241, 255, 0.95);
            --toast-text-color: #10171d;
            --modal-overlay-bg: rgba(0, 0, 0, 0.7);
            --modal-bg: #161f27;
        }

        /* --- 基本スタイル --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- 上部コンテナ --- */
        .top-container {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background-color: var(--header-bg-color);
        }

        .tab-bar {
            display: flex;
            background-color: var(--tab-bg);
            padding: 0 4px 0 4px;
            gap: 4px;
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            flex: 1;
            max-width: 120px;
            padding: 8px 10px;
            font-size: 0.85rem;
            background-color: transparent;
            color: var(--text-color);
            border: none;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, background-color 0.2s;
            text-align: center;
            white-space: nowrap;
        }
        .tab.active {
            background-color: var(--tab-active-bg);
            opacity: 1;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
            box-sizing: border-box;
        }

        .top-toolbar {
            background-color: var(--tab-active-bg);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .top-toolbar::-webkit-scrollbar { display: none; }

        .bottom-toolbar {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 20;
            border-top: 1px solid var(--border-color);
            justify-content: flex-start;
            padding-bottom: env(safe-area-inset-bottom);
            transition: opacity 0.25s ease-in-out;
            background-color: var(--bottom-toolbar-bg);
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
        }

        .arrow-keys {
            display: flex;
            gap: 2px;
            margin-left: auto; 
        }
        .arrow-btn {
            font-size: 1.1rem; 
            font-weight: bold;
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
        }

        .divider {
            width: 1px;
            height: 24px;
            background-color: var(--border-color);
            margin: 0 4px;
            flex-shrink: 0;
        }

        .font-size-control { display: flex; align-items: center; gap: 4px; }
        #fontSizeSlider { width: 60px; cursor: pointer; }

        .toggle-container { display: flex; align-items: center; font-size: 0.8rem; cursor: pointer; }
        .toggle-container input { margin: 0 4px 0 0; width: 14px; height: 14px; }

        button.tool-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            border-radius: 6px;
            background-color: transparent;
            color: var(--text-color);
            cursor: pointer;
            touch-action: manipulation;
            transition: background-color 0.1s;
        }

        button.tool-btn:active { background-color: var(--btn-active-bg-color); }
        button.tool-btn.danger { color: var(--btn-danger-color); }
        button.tool-btn.danger:active { background-color: rgba(255, 107, 107, 0.1); }

        .icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: currentColor; 
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }

        .icon-undo { -webkit-mask-image: url('assets/undo.svg'); mask-image: url('assets/undo.svg'); }
        .icon-redo { -webkit-mask-image: url('assets/redo.svg'); mask-image: url('assets/redo.svg'); }
        .icon-trash { -webkit-mask-image: url('assets/trash.svg'); mask-image: url('assets/trash.svg'); }
        .icon-copy { -webkit-mask-image: url('assets/copy.svg'); mask-image: url('assets/copy.svg'); }
        .icon-paste { -webkit-mask-image: url('assets/paste.svg'); mask-image: url('assets/paste.svg'); }
        .icon-partial-select { -webkit-mask-image: url('assets/partial-select.svg'); mask-image: url('assets/partial-select.svg'); }

        /* --- テキストエリア --- */
        #memoArea {
            position: absolute;
            left: 0;
            width: 100%;
            padding-top: 10px;
            padding-left: 15px;
            padding-right: 15px;
            
            font-family: 'Courier New', Consolas, Monaco, 'Osaka-等幅', 'ＭＳ ゴシック', monospace;
            border: none;
            outline: none;
            resize: none;
            box-sizing: border-box;
            background-color: var(--textarea-bg-color);
            color: var(--text-color);
            caret-color: var(--text-color);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* --- トースト通知 --- */
        #toast {
            position: absolute; 
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--toast-bg-color);
            color: var(--toast-text-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { 
            opacity: 1;
            visibility: visible;
        }

        /* --- カスタムモーダル --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--modal-overlay-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease-out, visibility 0.2s ease-out;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background-color: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            width: 85%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: transform 0.2s ease-out;
            color: var(--text-color);
        }
        .modal-overlay.show .modal-box {
            transform: scale(1);
        }
        .modal-title {
            margin: 0 0 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .modal-body {
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-wrap; /* 改行を反映 */
        }
        .modal-btn-wrap {
            display: flex;
            justify-content: flex-end;
        }
        .modal-btn-close {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            background-color: var(--btn-active-bg-color);
            color: var(--text-color);
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-container">
        <div class="tab-bar" id="tabBar">
            <button class="tab active" data-tab="1">メモ 1</button>
            <button class="tab" data-tab="2">メモ 2</button>
            <button class="tab" data-tab="3">メモ 3</button>
        </div>

        <div class="toolbar top-toolbar">
            <button id="btnUndo" class="tool-btn" title="元に戻す"><span class="icon icon-undo"></span></button>
            <button id="btnRedo" class="tool-btn" title="やり直し"><span class="icon icon-redo"></span></button>
            <button id="btnClear" class="tool-btn danger" title="全文破棄"><span class="icon icon-trash"></span></button>
            
            <div class="divider"></div>
            
            <div class="font-size-control">
                <input type="range" id="fontSizeSlider" min="16" max="40" value="24" step="4">
            </div>
            <label class="toggle-container">
                <input type="checkbox" id="saveToggle">
                <span>保存</span>
            </label>
            
            <button id="btnTheme" class="tool-btn" title="テーマ切替">🌓</button>
            <button id="btnInfo" class="tool-btn" style="margin-left: auto;" title="情報">ℹ️</button>
        </div>
    </div>

    <textarea id="memoArea" placeholder="ここにメモを入力..."></textarea>

    <div class="toolbar bottom-toolbar">
        <button id="btnCopy" class="tool-btn" title="コピー"><span class="icon icon-copy"></span></button>
        <button id="btnPaste" class="tool-btn" title="ペースト"><span class="icon icon-paste"></span></button>
        <button id="btnPartialSelect" class="tool-btn" title="左へ選択拡張"><span class="icon icon-partial-select"></span></button>
        
        <div class="arrow-keys">
            <button id="btnArrowLeft" class="tool-btn arrow-btn">←</button>
            <button id="btnArrowUp" class="tool-btn arrow-btn">↑</button>
            <button id="btnArrowDown" class="tool-btn arrow-btn">↓</button>
            <button id="btnArrowRight" class="tool-btn arrow-btn">→</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="customModalOverlay" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle" class="modal-title"></h3>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-btn-wrap">
                <button id="btnModalClose" class="modal-btn-close">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const memoArea = document.getElementById('memoArea');
        const saveToggle = document.getElementById('saveToggle');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const btnTheme = document.getElementById('btnTheme');
        const toast = document.getElementById('toast');
        const bottomToolbar = document.querySelector('.bottom-toolbar');
        const topContainer = document.querySelector('.top-container');
        const tabs = document.querySelectorAll('.tab');
        
        // モーダル要素
        const modalOverlay = document.getElementById('customModalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const btnModalClose = document.getElementById('btnModalClose');

        let currentTab = 1;
        let tabData = {
            1: { history: [''], index: 0 },
            2: { history: [''], index: 0 },
            3: { history: [''], index: 0 }
        };
        let isProgrammaticChange = false;

        // --- チャタリング防止 ---
        memoArea.addEventListener('touchmove', function(e) {
            if (memoArea.scrollHeight <= memoArea.clientHeight) {
                e.preventDefault();
            }
        }, { passive: false });

        // --- レイアウト追従 ---
        let adjustLayout = () => {};

        if (window.visualViewport) {
            let lastViewportHeight = window.visualViewport.height;
            let resizeTimer;

            adjustLayout = () => {
                const vv = window.visualViewport;
                const viewTop = vv.offsetTop;
                const viewHeight = vv.height;
                
                const topHeight = topContainer.offsetHeight || 80;
                const tbHeight = bottomToolbar.offsetHeight || 45;
                
                topContainer.style.top = `${viewTop}px`;
                
                const toolbarTop = viewTop + viewHeight - tbHeight;
                bottomToolbar.style.top = `${toolbarTop}px`;
                
                memoArea.style.top = `${viewTop + topHeight}px`;
                memoArea.style.height = `${viewHeight - topHeight}px`;
                
                memoArea.style.paddingBottom = `${tbHeight + 10}px`;
                
                toast.style.top = `${toolbarTop - 60}px`;
            };

            window.visualViewport.addEventListener('resize', () => {
                const currentHeight = window.visualViewport.height;
                if (Math.abs(currentHeight - lastViewportHeight) > 40) {
                    bottomToolbar.classList.add('fade-out');
                    toast.classList.add('fade-out');
                    
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        bottomToolbar.classList.remove('fade-out');
                        toast.classList.remove('fade-out');
                    }, 350); 
                }
                lastViewportHeight = currentHeight;
                adjustLayout();
            });

            window.visualViewport.addEventListener('scroll', adjustLayout);
            window.addEventListener('scroll', adjustLayout); 
            
            requestAnimationFrame(adjustLayout);
            setTimeout(adjustLayout, 100);
        }

        // --- mousedownフォーカス外れ防止 ---
        document.querySelectorAll('button.tool-btn, .tab, input[type="range"], input[type="checkbox"]').forEach(el => {
            el.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                    e.preventDefault(); 
                }
            });
        });

        // --- モーダル制御 ---
        function showModal(title, text) {
            modalTitle.textContent = title;
            modalBody.textContent = text;
            modalOverlay.classList.add('show');
        }
        btnModalClose.addEventListener('click', () => modalOverlay.classList.remove('show'));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('show');
        });

        document.getElementById('btnInfo').addEventListener('click', () => {
            showModal("オフラインメモ", "バージョン: v23\n\n機能:\n・カスタムHTMLモーダル\n・半角/全角対応 高度なカーソル移動\n・テーマ切替\n・3タブ切替\n・自動保存\n・完全Absoluteレイアウト");
        });

        // --- テーマ切り替え ---
        function applyTheme(themeName) {
            document.body.classList.remove('force-light', 'force-dark');
            if (themeName) {
                document.body.classList.add(`force-${themeName}`);
            }
        }

        btnTheme.addEventListener('click', () => {
            const isDarkOS = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isForceDark = document.body.classList.contains('force-dark');
            const isForceLight = document.body.classList.contains('force-light');
            
            let isCurrentlyDark = isForceDark || (!isForceLight && isDarkOS);
            
            if (isCurrentlyDark) {
                applyTheme('light');
                localStorage.setItem('memo_theme', 'light');
                showToast('ライトモードに切り替えました');
            } else {
                applyTheme('dark');
                localStorage.setItem('memo_theme', 'dark');
                showToast('ダークモードに切り替えました');
            }
        });

        const savedTheme = localStorage.getItem('memo_theme');
        if (savedTheme) applyTheme(savedTheme);

        let toastTimer;
        function showToast(message) {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                const targetTab = parseInt(e.target.dataset.tab);
                if (targetTab === currentTab) return;

                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');

                currentTab = targetTab;
                localStorage.setItem('memo_active_tab', currentTab);

                const isSaveOn = localStorage.getItem(`memo_save_toggle_${currentTab}`) === 'true';
                saveToggle.checked = isSaveOn;

                isProgrammaticChange = true;
                memoArea.value = tabData[currentTab].history[tabData[currentTab].index] || '';
                isProgrammaticChange = false;

                memoArea.focus();
            });
        });

        function saveState() {
            if (isProgrammaticChange) return;
            const text = memoArea.value;
            const currentHistory = tabData[currentTab].history;
            const currentIndex = tabData[currentTab].index;

            if (text !== currentHistory[currentIndex]) {
                tabData[currentTab].history = currentHistory.slice(0, currentIndex + 1);
                tabData[currentTab].history.push(text);
                tabData[currentTab].index++;
            }
            saveToLocal('text');
        }

        memoArea.addEventListener('input', saveState);

        document.getElementById('btnUndo').addEventListener('click', () => {
            if (tabData[currentTab].index > 0) {
                tabData[currentTab].index--;
                updateTextarea(tabData[currentTab].history[tabData[currentTab].index]);
            }
            memoArea.focus();
        });

        document.getElementById('btnRedo').addEventListener('click', () => {
            if (tabData[currentTab].index < tabData[currentTab].history.length - 1) {
                tabData[currentTab].index++;
                updateTextarea(tabData[currentTab].history[tabData[currentTab].index]);
            }
            memoArea.focus();
        });

        function updateTextarea(text) {
            isProgrammaticChange = true;
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            memoArea.value = text;
            saveToLocal('text');
            memoArea.setSelectionRange(start, end);
            isProgrammaticChange = false;
        }

        document.getElementById('btnClear').addEventListener('click', () => {
            if (memoArea.value === '') {
                memoArea.focus();
                return;
            }
            memoArea.value = '';
            saveState(); 
            showToast('全て破棄しました（Undoで元に戻せます）');
            memoArea.focus();
        });

        document.getElementById('btnCopy').addEventListener('click', async () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            const currentText = memoArea.value;
            const isTextSelected = start !== end;
            const isActive = document.activeElement === memoArea;
            
            try {
                if (isTextSelected) {
                    const selectedText = currentText.substring(start, end);
                    await navigator.clipboard.writeText(selectedText);
                    showToast('選択部分をコピーしました');
                } else {
                    await navigator.clipboard.writeText(currentText);
                    showToast('全文をコピーしました');
                }
            } catch (err) {
                showToast('コピーに失敗しました');
            } finally {
                if (isActive) {
                    memoArea.focus();
                    if (isTextSelected) memoArea.setSelectionRange(start, end);
                }
            }
        });

        document.getElementById('btnPaste').addEventListener('click', async () => {
            const isActive = document.activeElement === memoArea;
            try {
                const text = await navigator.clipboard.readText();
                if (!text) return;

                const start = memoArea.selectionStart;
                const end = memoArea.selectionEnd;
                const currentText = memoArea.value;
                
                memoArea.value = currentText.substring(0, start) + text + currentText.substring(end);
                
                const newCursorPos = start + text.length;
                memoArea.setSelectionRange(newCursorPos, newCursorPos);
                
                memoArea.focus(); 
                saveState();
                showToast('ペーストしました');
            } catch (err) {
                const guideMessage = "クリップボードへのアクセスがブロックされています。\n\n" +
                    "【設定の変更方法】\n" +
                    "1. アドレスバーのアイコンをタップ\n" +
                    "2. 「Webサイトの設定」や「権限」を開く\n" +
                    "3. クリップボードへのアクセスを「許可」に変更\n\n" +
                    "※設定を変更せずにペーストする場合は、テキストエリアを長押しして「ペースト」を選択してください。";
                showModal("権限エラー", guideMessage);
                if (isActive) memoArea.focus();
            }
        });

        document.getElementById('btnPartialSelect').addEventListener('click', () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            if (start > 0) memoArea.setSelectionRange(start - 1, end);
            memoArea.focus();
        });

        // --- ▼ 修正：半角/全角の文字幅をシミュレーションする超精度の行計算 ▼ ---
        
        // 文字が半角（幅が半分）かどうか判定する関数
        function isHalfWidth(char) {
            const code = char.charCodeAt(0);
            // ASCII文字、半角カタカナを半角とみなす
            return (code >= 0x0020 && code <= 0x007E) || (code >= 0xFF61 && code <= 0xFF9F);
        }

        // テキストを「画面幅ごとの仮想的な行」に分割する関数
        function getVisualLines(text) {
            const style = window.getComputedStyle(memoArea);
            const paddingLeft = parseFloat(style.paddingLeft);
            const paddingRight = parseFloat(style.paddingRight);
            const availableWidth = memoArea.clientWidth - paddingLeft - paddingRight;
            
            const fontSize = parseFloat(style.fontSize);
            // 等幅フォントでは、半角は全角の約半分の幅
            const fullCharWidth = fontSize;
            const halfCharWidth = fontSize * 0.55; 

            const lines = [];
            let lineStart = 0;
            let currentWidth = 0;

            for (let i = 0; i < text.length; i++) {
                if (text[i] === '\n') {
                    lines.push({ start: lineStart, end: i });
                    lineStart = i + 1;
                    currentWidth = 0;
                    continue;
                }

                const charWidth = isHalfWidth(text[i]) ? halfCharWidth : fullCharWidth;
                
                if (currentWidth + charWidth > availableWidth && currentWidth > 0) {
                    lines.push({ start: lineStart, end: i });
                    lineStart = i;
                    currentWidth = charWidth;
                } else {
                    currentWidth += charWidth;
                }
            }
            lines.push({ start: lineStart, end: text.length });
            return { lines, fullCharWidth, halfCharWidth };
        }

        // 行の開始位置からカーソル位置までの「横幅ピクセル数」を計算
        function getWidthUpToIndex(text, start, end, fullW, halfW) {
            let w = 0;
            for (let i = start; i < end; i++) {
                w += isHalfWidth(text[i]) ? halfW : fullW;
            }
            return w;
        }

        // 目標の横幅に最も近いインデックスを探す
        function getIndexFromWidth(text, start, end, targetWidth, fullW, halfW) {
            let w = 0;
            for (let i = start; i < end; i++) {
                const cw = isHalfWidth(text[i]) ? halfW : fullW;
                if (w + cw / 2 > targetWidth) return i; 
                w += cw;
            }
            return end;
        }

        document.getElementById('btnArrowLeft').addEventListener('click', () => {
            const start = memoArea.selectionStart;
            if (start > 0) memoArea.setSelectionRange(start - 1, start - 1);
            memoArea.focus();
        });

        document.getElementById('btnArrowRight').addEventListener('click', () => {
            const end = memoArea.selectionEnd;
            if (end < memoArea.value.length) memoArea.setSelectionRange(end + 1, end + 1);
            memoArea.focus();
        });

        document.getElementById('btnArrowUp').addEventListener('click', () => {
            const text = memoArea.value;
            const cursorPos = memoArea.selectionStart;
            const info = getVisualLines(text);
            
            // 現在カーソルがいる仮想行を探す
            let currentLineIndex = 0;
            for (let i = 0; i < info.lines.length; i++) {
                if (cursorPos >= info.lines[i].start && cursorPos <= info.lines[i].end) {
                    currentLineIndex = i;
                    // 行末の \n の直後にカーソルがある場合の微調整
                    if (cursorPos === info.lines[i].start && i > 0 && text[cursorPos - 1] === '\n') {
                        currentLineIndex = i - 1;
                    }
                    break;
                }
            }

            if (currentLineIndex > 0) {
                const currentLine = info.lines[currentLineIndex];
                const prevLine = info.lines[currentLineIndex - 1];
                
                // 現在の行におけるカーソルのX座標を計算
                const currentXOffset = getWidthUpToIndex(text, currentLine.start, cursorPos, info.fullCharWidth, info.halfCharWidth);
                
                // 前の行で同じX座標になるインデックスを取得
                const newPos = getIndexFromWidth(text, prevLine.start, prevLine.end, currentXOffset, info.fullCharWidth, info.halfCharWidth);
                memoArea.setSelectionRange(newPos, newPos);
            } else {
                memoArea.setSelectionRange(0, 0); // 先頭
            }
            memoArea.focus();
        });

        document.getElementById('btnArrowDown').addEventListener('click', () => {
            const text = memoArea.value;
            const cursorPos = memoArea.selectionStart;
            const info = getVisualLines(text);
            
            let currentLineIndex = 0;
            for (let i = 0; i < info.lines.length; i++) {
                if (cursorPos >= info.lines[i].start && cursorPos <= info.lines[i].end) {
                    currentLineIndex = i;
                    if (cursorPos === info.lines[i].start && i > 0 && text[cursorPos - 1] === '\n') {
                        currentLineIndex = i - 1;
                    }
                    break;
                }
            }

            if (currentLineIndex < info.lines.length - 1) {
                const currentLine = info.lines[currentLineIndex];
                const nextLine = info.lines[currentLineIndex + 1];
                
                const currentXOffset = getWidthUpToIndex(text, currentLine.start, cursorPos, info.fullCharWidth, info.halfCharWidth);
                
                const newPos = getIndexFromWidth(text, nextLine.start, nextLine.end, currentXOffset, info.fullCharWidth, info.halfCharWidth);
                memoArea.setSelectionRange(newPos, newPos);
            } else {
                memoArea.setSelectionRange(text.length, text.length); // 末尾
            }
            memoArea.focus();
        });

        fontSizeSlider.addEventListener('input', (e) => {
            const size = e.target.value;
            memoArea.style.fontSize = size + 'px';
            saveToLocal('settings');
        });

        function saveToLocal(type) {
            localStorage.setItem(`memo_save_toggle_${currentTab}`, saveToggle.checked);
            
            if (type === 'text' || type === 'all') {
                if (saveToggle.checked) {
                    localStorage.setItem(`memo_data_${currentTab}`, memoArea.value);
                } else {
                    localStorage.removeItem(`memo_data_${currentTab}`);
                }
            }
            if (type === 'settings' || type === 'all') {
                localStorage.setItem('memo_font_size', fontSizeSlider.value);
            }
        }

        saveToggle.addEventListener('change', () => {
            if (saveToggle.checked) {
                showToast(`メモ ${currentTab} の自動保存をオンにしました`);
                saveToLocal('text');
            } else {
                showToast(`メモ ${currentTab} の自動保存をオフにし、データを破棄しました`);
                localStorage.removeItem(`memo_data_${currentTab}`);
            }
            saveToLocal('settings');
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedFontSize = localStorage.getItem('memo_font_size') || '24';
            fontSizeSlider.value = savedFontSize;
            memoArea.style.fontSize = savedFontSize + 'px';

            for(let i = 1; i <= 3; i++) {
                const isSaveOn = localStorage.getItem(`memo_save_toggle_${i}`) === 'true';
                if (isSaveOn) {
                    const savedText = localStorage.getItem(`memo_data_${i}`) || '';
                    tabData[i].history = [savedText];
                }
            }

            currentTab = parseInt(localStorage.getItem('memo_active_tab')) || 1;
            tabs.forEach(t => t.classList.toggle('active', parseInt(t.dataset.tab) === currentTab));
            const isSaveOn = localStorage.getItem(`memo_save_toggle_${currentTab}`) === 'true';
            saveToggle.checked = isSaveOn;
            
            memoArea.value = tabData[currentTab].history[tabData[currentTab].index] || '';
            
            memoArea.focus();
            const len = memoArea.value.length;
            memoArea.setSelectionRange(len, len);
            
            if (typeof adjustLayout === 'function') {
                setTimeout(adjustLayout, 50);
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('ServiceWorker registered:', reg.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
