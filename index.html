<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>オフラインメモ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- 変数定義 (色の設定) --- */
        :root {
            --bg-color: #ffffff;
            --header-bg-color: #f8f9fa;
            --text-color: #333333;
            --textarea-bg-color: #ffffff;
            --border-color: #e0e0e0;
            
            --btn-bg-color: #ffffff;
            --btn-active-bg-color: #e2e6ea;
            --btn-danger-color: #dc3545;
            
            --toast-bg-color: rgba(50, 50, 50, 0.9);
            --toast-text-color: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #10171d; 
                --header-bg-color: #161f27;
                --textarea-bg-color: #10171d;
                --border-color: #2a3b4c;
                --text-color: #e6f1ff; 

                --btn-bg-color: #161f27;
                --btn-active-bg-color: #2a3b4c;
                --btn-danger-color: #ff6b6b;

                --toast-bg-color: rgba(230, 241, 255, 0.95);
                --toast-text-color: #10171d;
            }
        }

        /* --- 基本スタイル --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- ツールバー共通スタイル --- */
        .toolbar {
            background-color: var(--header-bg-color);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 10;
        }

        /* --- 上部ツールバー --- */
        .top-toolbar {
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .top-toolbar::-webkit-scrollbar {
            display: none;
        }

        /* --- ▼ 下部ツールバー (Safari対策で position: fixed に変更) ▼ --- */
        .bottom-toolbar {
            border-top: 1px solid var(--border-color);
            justify-content: flex-start;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            /* キーボードが出た時のアニメーションを滑らかにする */
            transition: bottom 0.1s ease-out; 
        }

        /* ツールバー内の区切り線 */
        .divider {
            width: 1px;
            height: 24px;
            background-color: var(--border-color);
            margin: 0 4px;
            flex-shrink: 0;
        }

        /* --- UIパーツ --- */
        .font-size-control {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        #fontSizeSlider { width: 70px; cursor: pointer; }

        .toggle-container {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle-container input { margin: 0 4px 0 0; width: 16px; height: 16px; }

        button {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--btn-bg-color);
            color: var(--text-color);
            cursor: pointer;
            flex-shrink: 0;
            touch-action: manipulation;
            transition: background-color 0.1s;
        }

        button:active { background-color: var(--btn-active-bg-color); }
        button.danger { color: var(--btn-danger-color); border-color: var(--btn-danger-color); }
        button.danger:active { background-color: rgba(255, 107, 107, 0.1); }

        /* --- CSS Maskによるアイコン --- */
        .icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: currentColor; 
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }

        .icon-undo { -webkit-mask-image: url('assets/undo.svg'); mask-image: url('assets/undo.svg'); }
        .icon-redo { -webkit-mask-image: url('assets/redo.svg'); mask-image: url('assets/redo.svg'); }
        .icon-trash { -webkit-mask-image: url('assets/trash.svg'); mask-image: url('assets/trash.svg'); }
        .icon-copy { -webkit-mask-image: url('assets/copy.svg'); mask-image: url('assets/copy.svg'); }
        .icon-paste { -webkit-mask-image: url('assets/paste.svg'); mask-image: url('assets/paste.svg'); }
        .icon-partial-select { -webkit-mask-image: url('assets/partial-select.svg'); mask-image: url('assets/partial-select.svg'); }

        /* --- テキストエリア (全画面) --- */
        #memoArea {
            flex-grow: 1;
            width: 100%;
            /* ▼ 下部ツールバーにテキストが隠れないように padding-bottom を追加 ▼ */
            padding: 15px 15px 70px 15px;
            font-family: inherit;
            border: none;
            outline: none;
            resize: none;
            box-sizing: border-box;
            background-color: var(--textarea-bg-color);
            color: var(--text-color);
            caret-color: var(--text-color);
            -webkit-overflow-scrolling: touch;
        }

        /* --- トースト通知 --- */
        #toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--toast-bg-color);
            color: var(--toast-text-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out, bottom 0.1s ease-out;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="toolbar top-toolbar">
        <button id="btnUndo" title="元に戻す"><span class="icon icon-undo"></span></button>
        <button id="btnRedo" title="やり直し"><span class="icon icon-redo"></span></button>
        <button id="btnClear" class="danger" title="全文破棄"><span class="icon icon-trash"></span></button>
        <button id="btnCopy" title="コピー"><span class="icon icon-copy"></span></button>
        <button id="btnPaste" title="ペースト"><span class="icon icon-paste"></span></button>
        
        <div class="divider"></div>
        
        <div class="font-size-control">
            <input type="range" id="fontSizeSlider" min="14" max="48" value="24" step="1">
        </div>
        <label class="toggle-container">
            <input type="checkbox" id="saveToggle">
            <span>保存</span>
        </label>
    </div>

    <textarea id="memoArea" placeholder="ここにメモを入力..." autofocus></textarea>

    <div class="toolbar bottom-toolbar">
        <button id="btnPartialSelect" title="左へ選択拡張"><span class="icon icon-partial-select"></span></button>
    </div>

    <div id="toast"></div>

    <script>
        const memoArea = document.getElementById('memoArea');
        const saveToggle = document.getElementById('saveToggle');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const toast = document.getElementById('toast');
        const bottomToolbar = document.querySelector('.bottom-toolbar');
        
        // --- ▼ iOS Safari用：キーボードへの完璧な追従処理 (Visual Viewport API) ▼ ---
        if (window.visualViewport) {
            const adjustToolbarPosition = () => {
                // 画面全体の高さから、実際に見えている領域(キーボードを除いた部分)の高さを引く
                // offsetTopを加味することで、Safari特有のスクロールバウンス時のズレも補正します
                const offsetBottom = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
                const bottomVal = Math.max(0, offsetBottom);
                
                // 下部ツールバーとトーストをキーボードの高さ分だけ持ち上げる
                bottomToolbar.style.bottom = `${bottomVal}px`;
                toast.style.bottom = `${bottomVal + 70}px`;
            };

            // キーボードの出現(resize)や、スクロール(scroll)に合わせてリアルタイムに位置を更新
            window.visualViewport.addEventListener('resize', adjustToolbarPosition);
            window.visualViewport.addEventListener('scroll', adjustToolbarPosition);
            
            // 初期状態の計算
            adjustToolbarPosition();
        }
        // --- ▲ ここまで ▲ ---

        document.querySelectorAll('button, input[type="range"], input[type="checkbox"]').forEach(el => {
            el.addEventListener('mousedown', (e) => {
                if(e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                    e.preventDefault(); 
                }
            });
        });

        let toastTimer;
        function showToast(message) {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        let history = [''];
        let historyIndex = 0;
        let isProgrammaticChange = false;

        function saveState() {
            if (isProgrammaticChange) return;
            const text = memoArea.value;
            if (text !== history[historyIndex]) {
                history = history.slice(0, historyIndex + 1);
                history.push(text);
                historyIndex++;
            }
            saveToLocal('text');
        }

        memoArea.addEventListener('input', saveState);

        document.getElementById('btnUndo').addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                updateTextarea(history[historyIndex]);
            }
            memoArea.focus();
        });

        document.getElementById('btnRedo').addEventListener('click', () => {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                updateTextarea(history[historyIndex]);
            }
            memoArea.focus();
        });

        function updateTextarea(text) {
            isProgrammaticChange = true;
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            memoArea.value = text;
            saveToLocal('text');
            memoArea.setSelectionRange(start, end);
            isProgrammaticChange = false;
        }

        document.getElementById('btnClear').addEventListener('click', () => {
            if (memoArea.value === '') {
                memoArea.focus();
                return;
            }
            memoArea.value = '';
            saveState(); 
            showToast('全て破棄しました（Undoで元に戻せます）');
            memoArea.focus();
        });

        document.getElementById('btnCopy').addEventListener('click', async () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            const currentText = memoArea.value;
            const isTextSelected = start !== end;
            
            try {
                if (isTextSelected) {
                    const selectedText = currentText.substring(start, end);
                    await navigator.clipboard.writeText(selectedText);
                    showToast('選択部分をコピーしました');
                    memoArea.focus();
                    memoArea.setSelectionRange(start, end);
                } else {
                    await navigator.clipboard.writeText(currentText);
                    showToast('全文をコピーしました');
                    memoArea.focus();
                }
            } catch (err) {
                showToast('コピーに失敗しました');
                memoArea.focus();
            }
        });

        document.getElementById('btnPaste').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) return;

                const start = memoArea.selectionStart;
                const end = memoArea.selectionEnd;
                const currentText = memoArea.value;
                
                memoArea.value = currentText.substring(0, start) + text + currentText.substring(end);
                
                const newCursorPos = start + text.length;
                memoArea.setSelectionRange(newCursorPos, newCursorPos);
                
                memoArea.focus();
                saveState();
                showToast('ペーストしました');
                
            } catch (err) {
                const guideMessage = 
                    "クリップボードへのアクセスがブロックされています。\n\n" +
                    "【設定の変更方法】\n" +
                    "1. アドレスバー（URLの横）のアイコンをタップ\n" +
                    "2. 「Webサイトの設定」や「権限」を開く\n" +
                    "3. クリップボードへのアクセスを「許可」に変更\n\n" +
                    "※設定を変更せずにペーストする場合は、テキストエリアを長押しして標準の「ペースト」を選択してください。";
                
                alert(guideMessage);
                memoArea.focus();
            }
        });

        document.getElementById('btnPartialSelect').addEventListener('click', () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            
            if (start > 0) {
                memoArea.setSelectionRange(start - 1, end);
            }
            memoArea.focus();
        });

        fontSizeSlider.addEventListener('input', (e) => {
            const size = e.target.value;
            memoArea.style.fontSize = size + 'px';
            saveToLocal('settings');
        });

        function saveToLocal(type) {
            localStorage.setItem('memo_save_toggle', saveToggle.checked);
            
            if (type === 'text' || type === 'all') {
                if (saveToggle.checked) {
                    localStorage.setItem('memo_data', memoArea.value);
                }
            }
            
            if (type === 'settings' || type === 'all') {
                localStorage.setItem('memo_font_size', fontSizeSlider.value);
            }
        }

        saveToggle.addEventListener('change', () => {
            if (saveToggle.checked) {
                showToast('自動保存をオンにしました');
                saveToLocal('text');
            } else {
                showToast('自動保存をオフにし、データを破棄しました');
                localStorage.removeItem('memo_data');
            }
            saveToLocal('settings');
        });

        window.addEventListener('DOMContentLoaded', () => {
            const isSaveOn = localStorage.getItem('memo_save_toggle') === 'true';
            saveToggle.checked = isSaveOn;

            const savedFontSize = localStorage.getItem('memo_font_size') || '24';
            fontSizeSlider.value = savedFontSize;
            memoArea.style.fontSize = savedFontSize + 'px';
            
            if (isSaveOn) {
                const savedText = localStorage.getItem('memo_data') || '';
                memoArea.value = savedText;
                history = [savedText];
            }
            
            memoArea.focus();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('ServiceWorker registered:', reg.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
