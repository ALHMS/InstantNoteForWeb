<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>オフラインメモ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- 変数定義 (色の設定) --- */
        :root {
            /* ライトモード (通常) */
            --bg-color: #ffffff;
            --header-bg-color: #f8f9fa;
            --text-color: #333333;
            --textarea-bg-color: #ffffff;
            --border-color: #e0e0e0;
            
            --btn-bg-color: #ffffff;
            --btn-active-bg-color: #e2e6ea;
            --btn-danger-color: #dc3545;
            
            --toast-bg-color: rgba(50, 50, 50, 0.9);
            --toast-text-color: #ffffff;
        }

        /* --- ダークモード対応 (@media) --- */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #10171d; 
                --header-bg-color: #161f27;
                --textarea-bg-color: #10171d;
                --border-color: #2a3b4c;
                --text-color: #e6f1ff; 

                --btn-bg-color: #161f27;
                --btn-active-bg-color: #2a3b4c;
                --btn-danger-color: #ff6b6b;

                --toast-bg-color: rgba(230, 241, 255, 0.95);
                --toast-text-color: #10171d;
            }
        }

        /* --- 基本スタイル --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- ヘッダーとツールバー --- */
        .controls-container {
            background-color: var(--header-bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px;
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 10;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1rem;
            margin: 0;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 文字サイズ */
        .font-size-control {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
        }
        #fontSizeSlider { width: 60px; cursor: pointer; }

        /* 保存トグル */
        .toggle-container {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .toggle-container input { margin: 0 4px 0 0; width: 14px; height: 14px; }

        /* --- ツールバーとアイコンボタン --- */
        .toolbar {
            display: flex;
            gap: 8px;
        }

        button {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--btn-bg-color);
            color: var(--text-color);
            cursor: pointer;
            touch-action: manipulation;
            transition: background-color 0.1s;
        }

        button:active {
            background-color: var(--btn-active-bg-color);
        }

        button.danger {
            color: var(--btn-danger-color);
            border-color: var(--btn-danger-color);
        }
        button.danger:active {
            background-color: rgba(255, 107, 107, 0.1);
        }

        /* --- CSS Maskによるアイコンの実装 --- */
        .icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: currentColor; 
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
        }

        .icon-undo { -webkit-mask-image: url('assets/undo.svg'); mask-image: url('assets/undo.svg'); }
        .icon-redo { -webkit-mask-image: url('assets/redo.svg'); mask-image: url('assets/redo.svg'); }
        .icon-trash { -webkit-mask-image: url('assets/trash.svg'); mask-image: url('assets/trash.svg'); }
        .icon-copy { -webkit-mask-image: url('assets/copy.svg'); mask-image: url('assets/copy.svg'); }
        .icon-paste { -webkit-mask-image: url('assets/paste.svg'); mask-image: url('assets/paste.svg'); }
        .icon-partial-select { -webkit-mask-image: url('assets/partial-select.svg'); mask-image: url('assets/partial-select.svg'); }

        /* --- テキストエリア (全画面) --- */
        #memoArea {
            flex-grow: 1;
            width: 100%;
            padding: 15px;
            font-family: inherit;
            border: none;
            outline: none;
            resize: none;
            box-sizing: border-box;
            background-color: var(--textarea-bg-color);
            color: var(--text-color);
            -webkit-overflow-scrolling: touch;
        }

        /* --- トースト通知 --- */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--toast-bg-color);
            color: var(--toast-text-color);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 1000;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="controls-container">
        <header>
            <h1>メモ</h1>
            <div class="header-right">
                <div class="font-size-control">
                    <input type="range" id="fontSizeSlider" min="14" max="48" value="24" step="1">
                </div>
                <label class="toggle-container">
                    <input type="checkbox" id="saveToggle">
                    <span>保存</span>
                </label>
            </div>
        </header>

        <div class="toolbar">
            <button id="btnUndo" title="元に戻す"><span class="icon icon-undo"></span></button>
            <button id="btnRedo" title="やり直し"><span class="icon icon-redo"></span></button>
            <button id="btnClear" class="danger" title="全文破棄"><span class="icon icon-trash"></span></button>
            <button id="btnCopy" title="コピー"><span class="icon icon-copy"></span></button>
            <button id="btnPaste" title="ペースト"><span class="icon icon-paste"></span></button>
            <button id="btnPartialSelect" title="左へ選択拡張"><span class="icon icon-partial-select"></span></button>
        </div>
    </div>

    <textarea id="memoArea" placeholder="ここにメモを入力..." autofocus></textarea>
    <div id="toast"></div>

    <script>
        const memoArea = document.getElementById('memoArea');
        const saveToggle = document.getElementById('saveToggle');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const toast = document.getElementById('toast');
        
        // --- モバイルでのUX向上（ボタン押下時にテキストエリアからフォーカスが外れるのを防ぐ）---
        document.querySelectorAll('.toolbar button').forEach(btn => {
            btn.addEventListener('mousedown', (e) => {
                // デフォルトのフォーカス移動（キーボードが閉じるなどの挙動）を防ぎます
                e.preventDefault(); 
            });
        });

        // --- トースト通知機能 ---
        let toastTimer;
        function showToast(message) {
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // --- 履歴管理 (Undo/Redo) ---
        let history = [''];
        let historyIndex = 0;
        let isProgrammaticChange = false;

        function saveState() {
            if (isProgrammaticChange) return;
            const text = memoArea.value;
            if (text !== history[historyIndex]) {
                history = history.slice(0, historyIndex + 1);
                history.push(text);
                historyIndex++;
            }
            saveToLocal('text');
        }

        memoArea.addEventListener('input', saveState);

        document.getElementById('btnUndo').addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                updateTextarea(history[historyIndex]);
            }
            memoArea.focus();
        });

        document.getElementById('btnRedo').addEventListener('click', () => {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                updateTextarea(history[historyIndex]);
            }
            memoArea.focus();
        });

        function updateTextarea(text) {
            isProgrammaticChange = true;
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            memoArea.value = text;
            saveToLocal('text');
            memoArea.setSelectionRange(start, end);
            isProgrammaticChange = false;
        }

        // --- 全文破棄 ---
        document.getElementById('btnClear').addEventListener('click', () => {
            if (memoArea.value === '') {
                memoArea.focus();
                return;
            }
            memoArea.value = '';
            saveState(); 
            showToast('全て破棄しました（Undoで元に戻せます）');
            memoArea.focus();
        });

        // --- クリップボード操作 (統合コピー) ---
        document.getElementById('btnCopy').addEventListener('click', async () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            const currentText = memoArea.value;
            const isTextSelected = start !== end;
            
            try {
                if (isTextSelected) {
                    const selectedText = currentText.substring(start, end);
                    await navigator.clipboard.writeText(selectedText);
                    showToast('選択部分をコピーしました');
                    memoArea.focus();
                    memoArea.setSelectionRange(start, end);
                } else {
                    await navigator.clipboard.writeText(currentText);
                    showToast('全文をコピーしました');
                    memoArea.focus();
                }
            } catch (err) {
                showToast('コピーに失敗しました');
                memoArea.focus();
            }
        });

        // --- ペースト (iOSフォールバック対応) ---
        document.getElementById('btnPaste').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) return;

                const start = memoArea.selectionStart;
                const end = memoArea.selectionEnd;
                const currentText = memoArea.value;
                
                memoArea.value = currentText.substring(0, start) + text + currentText.substring(end);
                
                const newCursorPos = start + text.length;
                memoArea.setSelectionRange(newCursorPos, newCursorPos);
                
                memoArea.focus();
                saveState();
                showToast('ペーストしました');
                
            } catch (err) {
                const guideMessage = 
                    "クリップボードへのアクセスがブロックされています。\n\n" +
                    "【設定の変更方法】\n" +
                    "1. アドレスバー（URLの横）のアイコンをタップ\n" +
                    "2. 「Webサイトの設定」や「権限」を開く\n" +
                    "3. クリップボードへのアクセスを「許可」に変更\n\n" +
                    "※設定を変更せずにペーストする場合は、テキストエリアを長押しして標準の「ペースト」を選択してください。";
                
                alert(guideMessage);
                memoArea.focus();
            }
        });

        // --- 部分選択（カーソル左側の拡張選択）機能 ---
        document.getElementById('btnPartialSelect').addEventListener('click', () => {
            const start = memoArea.selectionStart;
            const end = memoArea.selectionEnd;
            
            // startが0より大きい（左側に文字がある）場合のみ左へ拡張する
            if (start > 0) {
                // start位置を1つ左へずらし、end位置はそのまま維持する
                memoArea.setSelectionRange(start - 1, end);
            }
            
            // 操作後に必ずフォーカスを戻して選択状態を明示する
            memoArea.focus();
        });

        // --- 文字サイズ変更機能 ---
        fontSizeSlider.addEventListener('input', (e) => {
            const size = e.target.value;
            memoArea.style.fontSize = size + 'px';
            saveToLocal('settings');
        });

        // --- 保存機能 (LocalStorage) ---
        function saveToLocal(type) {
            localStorage.setItem('memo_save_toggle', saveToggle.checked);
            
            if (type === 'text' || type === 'all') {
                if (saveToggle.checked) {
                    localStorage.setItem('memo_data', memoArea.value);
                }
            }
            
            if (type === 'settings' || type === 'all') {
                localStorage.setItem('memo_font_size', fontSizeSlider.value);
            }
        }

        saveToggle.addEventListener('change', () => {
            if (saveToggle.checked) {
                showToast('自動保存をオンにしました');
                saveToLocal('text');
            } else {
                showToast('自動保存をオフにし、データを破棄しました');
                localStorage.removeItem('memo_data');
            }
            saveToLocal('settings');
        });

        // --- 初期化処理 (データ復元と自動フォーカス) ---
        window.addEventListener('DOMContentLoaded', () => {
            const isSaveOn = localStorage.getItem('memo_save_toggle') === 'true';
            saveToggle.checked = isSaveOn;

            // デフォルト文字サイズを24に拡張しました
            const savedFontSize = localStorage.getItem('memo_font_size') || '24';
            fontSizeSlider.value = savedFontSize;
            memoArea.style.fontSize = savedFontSize + 'px';
            
            if (isSaveOn) {
                const savedText = localStorage.getItem('memo_data') || '';
                memoArea.value = savedText;
                history = [savedText];
            }
            
            // ページを開いたときに確実にテキストエリアをアクティブにする
            memoArea.focus();
        });

        // --- PWA (Service Worker) の登録 ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('ServiceWorker registered:', reg.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
